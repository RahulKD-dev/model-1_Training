<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>multiple Css Selectors</title>
  <style>
    h1, h2, h3 {
      color: #4CAF50;
      text-align: center;
    }
    p, .highlight {
      color: #555;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Multiple CSS Selectors</h1>
  <h2>Heading 2</h2>
  <h3>Heading 3</h3>
  <p>This is a paragraph styled with multiple CSS selectors.</p>
  <p class="highlight">This is another paragraph with the "highlight" class.</p>
  
</body>
</html>
