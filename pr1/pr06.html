<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiple Classes & Selectors</title>
  <style>
    /* Multiple class selectors */
    .box {
      width: 200px;
      height: 100px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .red {
      background-color: crimson;
      color: white;
    }

    .blue {
      background-color: steelblue;
      color: white;
    }

    .rounded {
      border-radius: 15px;
    }

    .shadow {
      box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
    }

    .red, .blue {
      font-weight: bold;
      border: 2px solid black;
    }

    .box p {
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>
  
  <div class="box red rounded shadow">
    <h3>Red Box</h3>
    <p>Has rounded corners and shadow.</p>
  </div>

  <div class="box blue shadow">
    <h3>Blue Box</h3>
    <p>Has shadow but no rounded corners.</p>
  </div>

  <div class="box red">
    <h3>Simple Red Box</h3>
    <p>No shadow or rounded corners.</p>
  </div>
</body>
</html>
