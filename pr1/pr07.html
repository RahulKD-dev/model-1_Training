<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline,Internal And External CSS
  </title>
  <link rel="stylesheet" href="pr07.css">
  <style>
    /* Internal CSS */
    body {
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #333;
      text-align: center;
      margin-top: 20px;
    }
    p {
      color: #666;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Internal CSS</h1>
  <p>This is a paragraph with internal CSS.</p>
  <h2 style="color: blue; text-align: left;">Inline CSS</h2>
  <p style="color: red; font-size: 20px;">This is a paragraph with inline CSS.</p>
  <h3>External CSS</h3>
  <p class="external">This is a paragraph styled with external CSS.</p>
</body>
</html>
