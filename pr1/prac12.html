<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grey Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .nav {
        margin: 7px 7px 0 7px;
        background-color: #333;
        height: 100px;
        width: 100%;
      }
      .side-bar {
        margin: 7px 7px 0 0;
        background-color: #555;
        height: 90px;
        width: 400px;
        float: right;
      }
      .main-content {
        margin:7px;
        background-color: #777;
        height: calc(100vh - 100px);
        width: calc(100% - 421px);
        float: left;
      }
      .nav,
      .side-bar,
      .main-content {
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div class="nav">Header</div>
    <div class="main-content">Main Content</div>
    <div class="side-bar">Side Bar 1</div>
    <div class="side-bar">Side Bar 2</div>
    <div class="side-bar">Side Bar 3</div>
    <div class="side-bar">Side Bar 4</div>
    <div class="side-bar">Side Bar 5</div>
    <div class="side-bar">Side Bar 6</div>
    <div class="side-bar">Side Bar 7</div>
  </body>
</html>
